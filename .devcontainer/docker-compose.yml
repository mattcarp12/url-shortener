version: '3.8'

services:
  workspace:
    image: mcr.microsoft.com/devcontainers/base:bookworm
    command: sleep infinity
    volumes:
      - ..:/workspace:cached
    network_mode: service:postgres # Allows localhost access to DBs within the container

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: shortener
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  localstack:
    image: localstack/localstack
    restart: unless-stopped
    ports:
      - "4566:4566" # The main LocalStack API Gateway port
    environment:
      - SERVICES=s3,ecs,rds,elasticache,cloudformation # The specific mock services we want
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - localstack-data:/var/lib/localstack
      - "/var/run/docker.sock:/var/run/docker.sock"

volumes:
  pgdata:
  localstack-data:
